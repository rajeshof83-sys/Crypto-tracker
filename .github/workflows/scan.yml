name: Viral Meme Coin Tracker

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  push:
    branches: ['*']
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (disables filters, sends 1 alert)'
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in test mode (disables all filters, sends 1 alert to verify pipeline)'
        required: false
        type: boolean
        default: false

# Prevent duplicate runs — if a run is in progress, skip the new one
concurrency:
  group: crypto-tracker
  cancel-in-progress: false

# Use Node.js 24 (removes deprecation warning)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install "requests>=2.28,<3"

      # Restore the dedup file from previous runs (prevents duplicate alerts)
      - name: Restore alert history
        uses: actions/cache@v4
        with:
          path: alerted_tokens.json
          key: alerted-tokens-${{ github.run_id }}
          restore-keys: alerted-tokens-

      - name: Run tracker
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_WEBHOOK: ${{ secrets.GOOGLE_SHEET_WEBHOOK }}
        run: python crypto_tracker.py ${{ inputs.test_mode == 'true' && '--test' || '' }}
