name: Meme Coin Scanner v3

on:
  schedule:
    # Hourly scan at minute 5
    - cron: '5 * * * *'
    # Smart Digests (IST → UTC):
    #   6:00 AM IST = 00:30 UTC
    #   11:00 AM IST = 05:30 UTC
    #   4:00 PM IST = 10:30 UTC
    #   9:00 PM IST = 15:30 UTC
    - cron: '30 0 * * *'
    - cron: '30 5 * * *'
    - cron: '30 10 * * *'
    - cron: '30 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Pull latest state
        run: git pull --rebase origin main || true

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GSHEET_CREDS_JSON: ${{ secrets.GSHEET_CREDS_JSON }}
          GSHEET_SHEET_ID: ${{ secrets.GSHEET_SHEET_ID }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: |
          cd meme_scanner_v3
          python scanner.py

      - name: Run outcome tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd meme_scanner_v3
          python outcome_tracker.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meme_scanner_v3/*.json
          git diff --cached --quiet || git commit -m "state $(date -u +%Y-%m-%dT%H:%M)"
          git push
