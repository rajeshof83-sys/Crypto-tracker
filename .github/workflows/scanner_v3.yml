name: Meme Coin Scanner v3

on:
  schedule:
    # ── Hourly scan: 4 staggered triggers per hour ──
    # GitHub Actions free-tier cron is unreliable (15-60 min jitter, occasional skips).
    # Firing 4x/hour gives ~99.7% probability that at least one fires on time.
    # scanner.py has a 50-minute dedup guard so only ONE actually executes the scan;
    # the other 3 exit in ~10 seconds with a skip message.
    - cron: '5 * * * *'
    - cron: '20 * * * *'
    - cron: '35 * * * *'
    - cron: '50 * * * *'
    # ── Smart Digests (IST → UTC) ──
    #   6:00 AM IST = 00:30 UTC  (Morning Brief)
    #  11:00 AM IST = 05:30 UTC  (Midday Pulse)
    #   4:00 PM IST = 10:30 UTC  (Afternoon Intel)
    #   9:00 PM IST = 15:30 UTC  (Evening Wrap)
    - cron: '30 0 * * *'
    - cron: '30 5 * * *'
    - cron: '30 10 * * *'
    - cron: '30 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Pull latest state
        run: git pull --rebase origin main || true

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_WEBHOOK: ${{ secrets.GOOGLE_SHEET_WEBHOOK }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: |
          cd meme_scanner_v3
          python scanner.py

      - name: Run outcome tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_WEBHOOK: ${{ secrets.GOOGLE_SHEET_WEBHOOK }}
        run: |
          cd meme_scanner_v3
          python outcome_tracker.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meme_scanner_v3/*.json
          git diff --cached --quiet || git commit -m "state $(date -u +%Y-%m-%dT%H:%M)"
          git push
